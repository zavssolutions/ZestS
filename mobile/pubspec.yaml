name: zests_app
description: "ZestS mobile application"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^16.0.0
  dio: ^5.9.0
  shared_preferences: ^2.5.3
  firebase_core: ^3.10.1
  firebase_auth: ^5.5.0
  firebase_messaging: ^15.2.0
  firebase_remote_config: ^5.2.0
  firebase_analytics: ^11.4.0
  google_sign_in: ^6.2.1
  url_launcher: ^6.3.2
  cached_network_image: ^3.4.1
  skeletonizer: ^2.1.0+1
  permission_handler: ^12.0.1
  package_info_plus: ^8.3.1
  app_links: ^6.4.1
  intl: ^0.20.2
  share_plus: ^12.0.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/zests_logo.png

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/zests_logo.png
  android: true
  ios: true
  android_12:
    color: "#FFFFFF"
    image: assets/images/zests_logo.png
