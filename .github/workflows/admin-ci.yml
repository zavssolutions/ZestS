name: Admin CI

on:
  push:
    paths:
      - "admin/**"
      - ".github/workflows/admin-ci.yml"
  pull_request:
    paths:
      - "admin/**"

jobs:
  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
